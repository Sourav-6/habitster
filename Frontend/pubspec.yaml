name: habitster
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.9
  http: ^1.2.1
  cupertino_icons: ^1.0.6
  lottie: ^2.7.0
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0
  salomon_bottom_bar: ^3.3.2
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_native_splash: ^2.3.10

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

flutter_native_splash:
  color: "#ff0066"
  image: assets/images/white_logo.png
  android: true
  ios: true
  web: false
  android_12:
    image: assets/images/white_logo.png
    icon_background_color: "#ff0066"