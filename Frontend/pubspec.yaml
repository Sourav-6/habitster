name: habitster
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.9
  flutter_secure_storage: ^9.2.2
  http: ^0.13.6
  cupertino_icons: ^1.0.6
  lottie: ^2.7.0
  shared_preferences: ^2.2.2
  google_fonts: ^4.0.4
  salomon_bottom_bar: ^3.3.2
  table_calendar: ^3.1.2
  intl: ^0.20.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  uuid: ^4.4.0
  image_picker: ^1.0.7
  provider: ^6.0.5
  url_launcher: ^6.2.6
  flutter_animate: ^4.5.2
  percent_indicator: ^4.2.5
  fl_chart: ^0.66.2
  app_links: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_native_splash: ^2.3.10
  image: ^4.3.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

flutter_native_splash:
  color: "#ff0066"
  image: assets/images/white_logo_padded.png
  android: true
  ios: true
  web: false
  android_12:
    image: assets/images/white_logo_padded.png
    icon_background_color: "#ff0066"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
