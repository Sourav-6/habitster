name: habitster
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.0 # Add this line (use the latest version available)
  cupertino_icons: ^1.0.8
  lottie: ^2.7.0 # Add the Lottie package dependency
  shared_preferences: ^2.0.15 # Add this line (use the latest version available)
  google_fonts: ^6.1.0
  salomon_bottom_bar: ^3.3.2 # Add Salomon Bottom Bar package
  easy_date_timeline: ^2.0.9 # Add Easy Date Timeline package

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_native_splash: ^2.3.10

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

flutter_native_splash:
  color: "#ff0066"
  image: assets/images/white_logo.png
  android: true
  ios: true
  web: false
  android_12:
    image: assets/images/white_logo.png
    icon_background_color: "#ff0066"