name: habitster
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  lottie: ^2.7.0 # Add the Lottie package dependency

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/hammy_waving.png
    - assets/images/jim_strongman.png
    - assets/images/layla_book.png
    - assets/images/albert_study.png
    - assets/images/group_shot.png
    - assets/animations/waving.json
    - assets/animations/running.json
    - assets/animations/books.json
    - assets/animations/study.json
    - assets/animations/jumping.json
    - assets/images/white_logo.png
    - assets/animations/astro.json
    - assets/images/gradient_logo.png
    - assets/images/Woman Climbing Light Skin Tone.png
    - assets/images/Person Bouncing Ball Light Skin Tone.png
    - assets/images/Man In Lotus Position Dark Skin Tone.png
    - assets/images/apple.png
    - assets/images/google.png
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700